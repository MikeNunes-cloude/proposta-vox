<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 120">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d9d9de"/>
      <stop offset="55%" stop-color="#9a9aa2"/>
      <stop offset="100%" stop-color="#e8e8ec"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A3D"/>
      <stop offset="100%" stop-color="#E23A1C"/>
    </linearGradient>
  </defs>
  <!-- V check -->
  <polygon points="18,32 48,32 60,94" fill="url(#fire)"/>
  <polygon points="66,32 96,32 74,74" fill="url(#fire)"/>
  <!-- OX wordmark -->
  <text x="112" y="90" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="86" letter-spacing="-3" fill="url(#chrome)">OX</text>
</svg>
